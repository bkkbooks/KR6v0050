body:
  text: 觀經變像經文偈頌整理者陳明光題解觀經變像經文偈頌中國人所撰佛教文獻作者不詳刊刻於南宋趙智鳳鐫刻的寶頂山石窟大佛灣北巖觀經變像龕全國石窟中觀經變並不鮮見但變像與變文並列的不多規模如此宏大內容如此豐富則甚為罕見特別是十六觀的造像取材他處多以刻韋提希夫人像為正本龕卻刻了十六個不同階層的男女人物像並把各觀想中經文濃縮成二十字的偈頌刊刻在圖旁為各處石窟所罕見録文一大藏佛説觀無量壽佛經大藏經云爾時世尊告韋提希汝今知不阿彌陀佛去此不遠汝當繫念諦觀彼國淨業成者我今為汝廣説衆譬亦令末世一切凡夫欲修淨業者得生西方極樂國土欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三皈具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如此三事名為淨業佛告韋提希此三種業乃是過去未來現在三世諸佛淨業正因佛告阿難及韋提希凡生西方極樂國土有九品人上品上生上品上生者若有人願生彼國發三種心所謂慈心不殺具諸戒行讀誦大乘修行六念回向發願心具三心者必生彼國此人精進勇猛故阿彌陀佛與觀音勢至無數化佛無量大衆觀世音菩薩執金剛台與大勢至菩薩至行者前佛放光明照行者身行者見已歡喜踴躍自見其身乘金剛台隨從佛後如彈子往生彼國生彼國已見佛菩薩色相具足演説妙法聞已即悟無生法忍經須臾間歷事佛於諸佛前次第受記還至本國得無量陀羅尼法門是名上品上生者西方淨土上品中生大藏佛言上品中生受持讀誦方等經典善解義趣於第一義心不驚動深信因果不謗大乘以此功德回向願生西方極樂國土行此行者命欲終時阿彌陀佛與觀音勢至無量大衆持紫金台至行者前贊言法子汝行大乘解第一義是故我今來迎接汝行者自見坐紫金台合掌贊佛如一念頃即生彼國七寶池中佛及菩薩俱時放光照行者身因前宿習普聞衆聲純説甚深第一義諦應時即得阿耨菩提即至十方歷事諸佛於諸佛所修諸三昧得無生忍摩頂受記是故名為上品中生者極樂世界上品下生大藏佛言上品下生者發無回命觀音此人我事時即日見世尊後即得往生三七日後乃了聞衆音聲皆演妙法遊歷十方供養諸佛於諸佛前聞甚深法經三小劫得百法明門住歡喜地是名上品下生者中品上生中品上生者若有衆生受持五戒持八戒齋修行諸戒不造五逆無衆過患以此善根回向願生西方極樂世界臨命終時阿彌陀佛與諸菩薩眷屬圍繞放金色光至其人所演説苦空無常無我讚歎出家得離衆苦行者見已心大歡喜自見己身坐蓮花台長跪合掌為佛作禮聞贊四諦得羅漢道三明六通具八解脫是名中品上生者中品中生大藏佛言中品中生者若有衆生一日一夜持八戒齋持沙彌戒持具足戒威儀無缺以此功德回向願生極樂戒香薰修如此行者命欲終時阿彌陀佛與諸菩薩持七寶蓮花至行者前贊言善男子如汝善人隨順三世諸佛教法我來迎汝行者自見坐蓮花內蓮花即合生於西方七寶池中經於七日蓮花乃敷開目合掌讚歎世尊聞法歡喜得須陀洹經半劫已成阿羅漢是名中品中生者中品下生中品下生者若善男子善女人孝養父母行事仁慈此人命欲終時遇善知識為其廣説阿彌陀佛國土樂事及四十八願聞此事已尋即命終屈伸臂頃即生極樂世界在蓮花內經於七日遇觀音勢至為説妙法聞法歡喜得須陀洹經一小劫成阿羅漢是則名為中品下生者下品上生下品上生者或有人作衆惡業雖不誹謗如此愚人多造惡法無有慚愧命欲善知識為贊大乘十二部經首如來諸經名故除卻千劫阿彌陀佛稱佛名故爾時彼佛即遺化佛化觀音勢至男子以汝稱佛迎汝行者即見室見已歡喜即便命終乘寶蓮花寶池中經七七日蓮花乃敷菩薩為説十二部經聞以信解發無上道心得入初地聞贊三寶名字即得往生是名下品上生者下品中生大藏佛言下品中生者或有衆生毀犯戒律偷僧祇物不淨説法無有慚愧如此罪人以惡業故應墮地獄命欲終時地獄衆火一時俱至遇善知識為説阿彌陀佛十力威德亦贊戒定慧解解脫知見此人聞已除八十億劫生死之罪地獄猛火化為涼風吹諸天花花上皆有化佛菩薩迎接此人如一念頃即得往生七寶池中蓮花之內經於六劫蓮花乃敷觀音勢至以梵音聲安慰彼人為説大乘經典聞此法已即發無上道心是名下品中生者下品下生下品下生者或有衆生不作善業五逆十惡具諸不善如此愚人以惡業故應墮惡道經歷多劫受苦無窮如此愚人臨命終時遇善知識種種安慰教令念佛彼人苦逼不遑念佛告言若不能念佛者應稱無量壽佛如是至心令聲不絶稱佛名故於念念中除八十億劫生死之罪命終之後見金蓮花住其人前如一念頃即得往生極樂世界於蓮花中滿十二大劫蓮花方開時觀音勢至為廣説實相除滅罪法聞已歡喜應即發菩提心是名下品下生者日觀輾破無明窟衝開極樂鄉紅輪重示處即此是西方水觀禪心澄定水堅住即寒冰一片常清淨光明直下生地觀瑩徹琉璃地古佛心正觀無相邪見入林樹觀五根為道本七覺是心華八正菩提果莊嚴法界家池觀彩現金剛底光翻七寶蓮雖分八功德祇是一根源總觀遍地林泉景高樓四望寬若無向上眼誰得憑欄杆寶像觀衆生心是佛想念即菩提寶像如開眼分明更是誰華座觀法身觀且舉河沙量令觀法界身白毫如不昧諸相自然分觀世音觀觀音何所辨立佛在天冠五道光中現慈悲接有緣大勢至觀勢至如何別冠中望寶瓶無邊光照處智慧攝群生普觀依正莊嚴事花開次第成坦然心不動時至佛來迎丈六金身觀佛智開方便令觀丈六身觀音並勢至化佛亦如雲上品觀上品皆菩薩初中了正因第三新發意一道出凡倫中品觀中品阿羅漢同超三濁時開花分早晚見佛智參差下品觀下品全凶惡曾無二利因遇人稱十念勇猛謝沉淪録文完録文二普勸持念阿彌陀佛浮世生身事若何猶如春燕壘巢窠波波役役營家計不如隨分念彌陀文章俊辨應名科朱紫榮身志意多官崇誰免無常至不如方便念彌陀飛槍走射勢難過駿馬騎來似擲梭力敵萬夫輸老病不如習善念彌陀富貴資財不厭多朝昏計算恐差訛憂煩不覺頭如雪不如知足念彌陀音聲清響善謳歌一曲新詞格調和直饒唱得行雲墜不如淨口念彌陀柳眉星眼賽嫦娥玉體時新著綺羅華容祇可常年少不如及早念彌陀棋誇敵手智謀多打劫爭先在切磋光陰一半因茲廢不如端坐念彌陀商人經紀最奔波遠地他方到處過江湖風浪危中險不如歸去念彌陀慣習公方損陷他巧妝詞頌逞嘍囉家財使盡招人怨不如省事念彌陀殺業冤家債漸多將何詞理見閻羅教君一路超生法不如知悔念彌陀念佛持經福最多不持不念罪恆河如來金口親宣説普為衆生解網羅幸知仁者信受奉行録文完録文三再三相勸念彌陀三界炎炎如火聚道人未蓮池寶土樂無窮收拾身心如西方極樂七寶池八功德水不思議底有金沙岸香樹蓮花湧出化生兒人人佛性本天真念佛常為作佛因不念不稱心似漆何時得見本來身眷屬親情不是親滿堂金玉未為珍不如一句彌陀佛便是生生引路人念念常存念佛心念而無念最功深功成無念須成佛成佛人天自仰欽口間念佛譬如間不礙家緣不費錢大有便宜何不念莫教臨死卻茫然貪生日日祇忙忙不覺年衰鬢似霜或若鬼魔來耍取且推不辦向閻王有田不種放教荒秋後羡人收滿倉有佛有經不禮念死來地獄遣誰當地獄三途卻愛遊天堂佛國不尋求欲求佛國天堂樂勤念彌陀早轉頭再三相勸念彌陀不念之人莫奈何雖則無人奈何得奈何卻自有閻羅念念無常步步隨勤心念佛是便宜再三共勸成多口子細思量為阿誰録文完
